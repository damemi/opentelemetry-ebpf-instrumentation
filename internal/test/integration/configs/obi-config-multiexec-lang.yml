log_config: yaml
routes:
  patterns:
    - /basic/:rnd
  unmatched: path
otel_metrics_export:
  endpoint: http://otelcol:4018
otel_traces_export:
  endpoint: http://jaeger:4318
discovery:
  instrument:
    - languages: "{rust,ruby}"
  exclude_instrument:
    - exe_path: "{obi,prometheus,otelcol*,all*,launcher}"
attributes:
  kubernetes:
    enable: true
    cluster_name: my-kube
  select:
    http_server_request_duration_seconds_count:
      exclude: ["server_address"]
    "*":
      include: ["*"]
