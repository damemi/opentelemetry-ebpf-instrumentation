version: "3.8"

services:
  curler:
    image: alpine/curl@sha256:20f574db1c1b3dce719bb988fcf61c04ec126bde5e8eb61db76406c2f305c856
    command:
      - sh
      - -c
      - "while true; do curl -s https://github.com/; sleep 5; done"

  obi:
    build:
      context: ../../..
      dockerfile: ./internal/test/integration/components/obi/Dockerfile
    volumes:
      - ./configs/:/configs
      - ./system/sys/kernel/security:/sys/kernel/security
      - ../../../testoutput:/coverage
      - ../../../testoutput/run-netolly:/var/run/obi
    image: hatest-obi
    privileged: true
    network_mode: host
    environment:
      OTEL_EBPF_CONFIG_PATH: /configs/obi-config-netolly.yml
      GOCOVERDIR: "/coverage"
      OTEL_EBPF_NETWORK_METRICS: "true" # explicitly enabling network metrics
      OTEL_EBPF_NETWORK_PRINT_FLOWS: "true"
      OTEL_EBPF_METRICS_INTERVAL: "1s"
      OTEL_EBPF_OTLP_TRACES_BATCH_TIMEOUT: "1ms"
      OTEL_EBPF_BPF_BATCH_TIMEOUT: "1s"
      OTEL_EBPF_NETWORK_CACHE_ACTIVE_TIMEOUT: "1s"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318 # otelcol exposing port in local node
      OTEL_EBPF_LOG_LEVEL: "DEBUG"
      OTEL_EBPF_BPF_DEBUG: "TRUE"
      OTEL_EBPF_HOSTNAME: "beyla"
      OTEL_EBPF_NETWORK_REVERSE_DNS_TYPE: "ebpf"

  # OpenTelemetry Collector for Metrics. For Traces, we use directly Jaeger
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.148.0@sha256:8164eab2e6bca9c9b0837a8d2f118a6618489008a839db7f9d6510e66be3923c
    container_name: otel-col
    deploy:
      resources:
        limits:
          memory: 125M
    restart: unless-stopped
    command: ["--config=/etc/otelcol-config/otelcol-config.yml"]
    volumes:
      - ./configs/:/etc/otelcol-config
    ports:
      - "4317" # OTLP over gRPC receiver
      - "4318:4318" # OTLP over HTTP receiver
      - "9464" # Prometheus exporter
      - "8888" # metrics endpoint
    depends_on:
      prometheus:
        condition: service_started

  # Prometheus
  prometheus:
    image: quay.io/prometheus/prometheus:v3.10.0@sha256:7571a304e67fbd794be02422b13627dc7de822152f74e99e2bef95d29eceecde
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus-config${PROM_CONFIG_SUFFIX}.yml
      - --web.enable-lifecycle
      - --web.route-prefix=/
    volumes:
      - ./configs/:/etc/prometheus
    ports:
      - "9090:9090"
