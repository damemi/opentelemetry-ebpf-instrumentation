
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  text/plain;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;

    keepalive_timeout  65;

    server {
        listen 80;
        server_name mock-imds;

        # The GCP metadata client validates this response header on every request
        add_header Metadata-Flavor "Google" always;

        location = /computeMetadata/v1/project/project-id {
            return 200 "my-test-project";
        }

        location = /computeMetadata/v1/project/numeric-project-id {
            return 200 "1234567890";
        }

        location = /computeMetadata/v1/instance/id {
            return 200 "1234567890123456789";
        }

        location = /computeMetadata/v1/instance/name {
            return 200 "test-instance";
        }

        # ZoneWithContext strips the path prefix, returning just "us-central1-a"
        location = /computeMetadata/v1/instance/zone {
            return 200 "projects/1234567890/zones/us-central1-a";
        }

        location = /computeMetadata/v1/instance/machine-type {
            return 200 "n1-standard-1";
        }

        location = /computeMetadata/v1/instance/hostname {
            return 200 "test-instance.c.my-test-project.internal";
        }

        # Catch-all for GCP on-instance detection probes and other metadata requests
        location / {
            return 200 "";
        }
    }

}
