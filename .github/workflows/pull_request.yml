name: Pull request checks

on:
  push:
    branches: ["main", "release-*"]
  pull_request:
    branches: ["main", "release-*"]
  workflow_call:
    inputs:
      ref:
        description: "Git ref (commit, branch, or tag) to check out"
        required: false
        type: string

concurrency:
  group: pull-request-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-and-checks:
    name: Generate and checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0 # zizmor: ignore[cache-poisoning] go.sum verifies module integrity
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Go build cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3 # zizmor: ignore[cache-poisoning] go build cache is content-addressable and self-verifying
        with:
          path: ~/.cache/go-build
          key: go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-

      - name: Generate and build tools
        run: make prereqs docker-generate unit-test-tools

      - name: Run checks
        run: make go-mod-tidy license-header-check notices-update check-go-mod check-ebpf-ver-synced check-config-schema check-clean-work-tree

      - name: Build unit test matrix
        id: build-matrix
        env:
          PARTITIONS: 3
        run: |
          echo -n "matrix=" >> $GITHUB_OUTPUT
          make unit-test-matrix-json >> $GITHUB_OUTPUT

      - name: Upload generated BPF files
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          # prevent cache poisoning by using the SHA of the commit.
          name: bpf-generated-${{ github.sha }}
          path: |
            **/*_bpfel.go
            **/*_bpfel.o
          retention-days: 1

  lint:
    name: Lint
    needs: generate-and-checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0 # zizmor: ignore[cache-poisoning] go.sum verifies module integrity
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Go build cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3 # zizmor: ignore[cache-poisoning] go build cache is content-addressable and self-verifying
        with:
          path: ~/.cache/go-build
          key: go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-

      - name: Download generated BPF files
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: bpf-generated-${{ github.sha }}

      - name: Lint
        run: make lint

  unit-test:
    name: "Unit test ${{ matrix.description }}"
    needs: generate-and-checks
    permissions:
      checks: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-and-checks.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0 # zizmor: ignore[cache-poisoning] go.sum verifies module integrity
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Go build cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3 # zizmor: ignore[cache-poisoning] go build cache is content-addressable and self-verifying
        with:
          path: ~/.cache/go-build
          key: go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-pr-race-${{ runner.os }}-${{ runner.arch }}-

      - name: Download generated BPF files
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: bpf-generated-${{ github.sha }}

      - name: Build test tools
        run: make prereqs unit-test-tools

      - name: Run unit tests
        env:
          MATRIX_ID: ${{ matrix.id }}
          MATRIX_PACKAGES: ${{ matrix.packages }}
        run: make run-unit-test-shard SHARD_ID="${MATRIX_ID}" UNIT_TEST_PACKAGES="${MATRIX_PACKAGES}"

      - name: Exclude generated files from coverage
        run: grep -vE "(_bpfel.go)|(/opentelemetry-ebpf-instrumentation/internal/test/)|(/opentelemetry-ebpf-instrumentation/configs/)|(.pb.go)|(/pkg/export/otel/metric/)" testoutput/cover-shard-"${MATRIX_ID}".all.txt > testoutput/cover-shard-"${MATRIX_ID}".txt
        env:
          MATRIX_ID: ${{ matrix.id }}

      - name: Report coverage
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./testoutput/cover-shard-${{ matrix.id }}.txt
          flags: unittests
          name: go-unittests-coverage-shard-${{ matrix.id }}-${{ github.run_number }}

  collector-cross-compile:
    name: "collector cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})"
    needs: generate-and-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Supported platforms (full OBI eBPF support)
          - { goos: linux,   goarch: amd64  }
          - { goos: linux,   goarch: arm64  }
          # Unsupported platforms (factory stubs — must compile, return errUnsupportedPlatform at runtime)
          - { goos: linux,   goarch: ppc64le }
          - { goos: linux,   goarch: s390x   }
          - { goos: linux,   goarch: "386"   }
          - { goos: windows, goarch: amd64  }
          - { goos: windows, goarch: arm64  }
          - { goos: darwin,  goarch: amd64  }
          - { goos: darwin,  goarch: arm64  }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0 # zizmor: ignore[cache-poisoning] go.sum verifies module integrity
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Go build cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3 # zizmor: ignore[cache-poisoning] go build cache is content-addressable and self-verifying
        with:
          path: ~/.cache/go-build
          key: go-build-cross-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            go-build-cross-${{ matrix.goos }}-${{ matrix.goarch }}-

      - name: Download generated BPF files
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: bpf-generated-${{ github.sha }}

      - name: Build collector package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./collector/...
